    <script>
        window.addEventListener('load', () => {
            var path = "/jiniebox/box";
            var param = "cmd=list";
            param += "&buid=" + urlparam("buid");
            param += "&authcode=" + urlparam("authcode");
            param += "&seq_store=" + urlparam("seq_store");
            request(path, param);
        }, false);

        function urlparam(name) {
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            if (!urlParams.has(name)) { return false; }
            return urlParams.get(name);
        }

        /**
         * path : 요청받을 서비스페이지
         * params : 전송할 데이터 (name1=value1&name2=value2&name3=value3)    
         */
        function request(path, params) {
            var _ajax = new XMLHttpRequest();
            _ajax.onreadystatechange = function () {
                if (checkAjaxSuc(_ajax)) {
                    var resMsg = _ajax.responseText;
                    if (resMsg.length > 0) {
                        //alert(resMsg);
                        let resJo = JSON.parse(resMsg);
                        let boxesJo = resJo.boxes;
                        for (box of boxesJo) {
                            createBoxcard(resJo.buid, box.seq, box.name, box.details, box.items);
                        }
                    }
                }
            };

            // POST 방식으로 요청시
            _ajax.open("POST", path);
            _ajax.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
            try {
                _ajax.send(params);
            } catch (e) {
                if (e.message && e.message.indexOf("0x80004005") > -1) {
                    return;
                }
            }
        }

        function checkAjaxSuc(ajax) {
            if (ajax.readyState == 4) {
                try {
                    return (ajax.status >= 200 && ajax.status < 300);
                } catch (ignore) {
                    return false;
                }
            }
            return false;
        }

        function createBoxcard(buid, seq, name, details, items) {
            const _doc = window.document;

            let card_outer = _doc.createElement("div");
            card_outer.className = "col-sm-6 mb-3 mb-sm-3";
            _doc.querySelector("#card-row").appendChild(card_outer);
            
            let card = _doc.createElement("div");
            card.className = "card";
            card.addEventListener('click', event => {
                window.location.href = "/jiniebox/jiniebox_box_info.html?seq_box=" + seq + "&buid=" + buid;
            })
            card_outer.appendChild(card);
            
            let card_body = _doc.createElement("div");
            card_body.className = "card-body";
            card.appendChild(card_body);

            let card_title = _doc.createElement("h5");
            card_title.className = "card-title";
            card_title.innerText = name;
            card_body.appendChild(card_title);

            if (details) {
                ;
            } else {
                let card_text = _doc.createElement("p");
                card_text.className = "card-text";
                card_text.innerText = "Some quick example text to build on the card title";
                card_body.appendChild(card_text);
            }

            if (items && items.length > 0) {
                let list_group = _doc.createElement("ul");
                list_group.className = "list-group list-group-flush";
                card.appendChild(list_group);

                let list_group_item = null;
                items.forEach(elem => {
                    list_group_item = _doc.createElement("li");
                    list_group_item.className = "list-group-item d-flex justify-content-between align-items-center";
                    list_group_item.innerHTML = elem.name+"<span class='badge bg-primary rounded-pill' >"+elem.qty+"</span >";
                    list_group.appendChild(list_group_item);
                });
            }
        }
    </script>
