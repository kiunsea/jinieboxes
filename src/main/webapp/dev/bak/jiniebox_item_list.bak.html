    <script>
        window.addEventListener('load', () => {
            var path = "/jiniebox/item";
            var param = "cmd=list";
            param += "&buid=" + urlparam("buid");
            param += "&authcode=" + urlparam("authcode");
            param += "&seq_store=" + urlparam("seq_store");
            if (urlparam("box_name"))
                param += "&box_name=" + urlparam("box_name");
            request(path, param);
        }, false);

        function urlparam(name) {
            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            if (!urlParams.has(name)) { return false; }
            return urlParams.get(name);
        }

        /**
         * path : 요청받을 서비스페이지
         * params : 전송할 데이터 (name1=value1&name2=value2&name3=value3)    
         */
        function request(path, params) {
            var _ajax = new XMLHttpRequest();
            _ajax.onreadystatechange = function () {
                if (checkAjaxSuc(_ajax)) {
                    var resMsg = _ajax.responseText;
                    if (resMsg.length > 0) {
                        //alert(resMsg);
                        let itemsJo = JSON.parse(resMsg)["items"];
                        if (itemsJo) {
                            createTable(itemsJo);
                        }
                    }
                }
            };

            // POST 방식으로 요청시
            _ajax.open("POST", path);
            _ajax.setRequestHeader("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8");
            try {
                _ajax.send(params);
            } catch (e) {
                if (e.message && e.message.indexOf("0x80004005") > -1) {
                    return;
                }
            }
        }

        function checkAjaxSuc(ajax) {
            if (ajax.readyState == 4) {
                try {
                    return (ajax.status >= 200 && ajax.status < 300);
                } catch (ignore) {
                    return false;
                }
            }
            return false;
        }

        function createTable(itemsJo) {
            const _doc = window.document;

            let _table = _doc.createElement("table");
            _table.className = "table";
            _doc.querySelector("#card-row").appendChild(_table);

            let _thead = _doc.createElement("thead");
            let th_str = "<th scope = \"col\" >#</th>";
            th_str += "<th scope=\"col\">이름</th>";
            th_str += "<th scope=\"col\">갯수</th>";
            th_str += "<th scope=\"col\">등록일자</th>";
            th_str += "<th scope=\"col\">만료일자</th>";
            th_str += "<th scope=\"col\">보관함</th>";
            _thead.innerHTML = "<tr>" + th_str + "</tr>";
            _table.appendChild(_thead);

            let _tbody = _doc.createElement("tbody");

            let tr_str = "";
            let rowcnt = 0;
            itemsJo.forEach(elem => {
                tr_str += "<th scope=\"row\">" + (++rowcnt) + "</th>";
                tr_str += "<td>" + elem.name + "</td>";
                tr_str += "<td>" + elem.qty + "</td>";
                tr_str += "<td>" + elem.insdate + "</td>";
                tr_str += "<td>" + elem.expdate + "</td>";
                tr_str += "<td>" + elem.bname + "</td>";
                tr_str = "<tr>" + tr_str + "</tr>";
            });

            _tbody.innerHTML = tr_str;
            _table.appendChild(_tbody);
        }
    </script>
