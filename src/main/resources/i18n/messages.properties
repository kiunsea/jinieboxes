# Jinieboxes — i18n message bundle (default: Korean)
# 다른 로케일은 messages_<lang>.properties 참고. 키 누락 시 자동으로 이 파일로 fallback.
#
# 키 명명 규칙:
#   <영역>.<세부>.<역할>    예: integration.disabled, common.error.system

# ─── 공통 ───
common.error.system            = * 시스템 에러입니다
common.error.invalid_request   = * 잘못된 요청입니다 (명령어가 없습니다)
common.error.user_session      = 사용자 로그인 정보가 없습니다\n계속하시려면 로그인 해주세요
common.success                 = 인증에 성공하였습니다

# ─── 외부 연동 (IntegrationGate) ───
integration.disabled           = {0} 연동이 설정되지 않았습니다

# ─── 인증 ───
auth.failed                    = 인증 정보가 올바르지 않습니다
auth.user_not_found            = 사용자 아이디가 없습니다
auth.email_verify_required     = 이메일 인증이 필요합니다
auth.password_invalid          = 사용자 암호가 올바르지 않습니다
